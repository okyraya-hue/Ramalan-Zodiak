<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramalan Horoskop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

/* LOGO */
.logo{
  width:200px;
  margin-bottom:60px;
}

h1{
  margin-bottom:20px;
}

select, button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:16px;
}

select{
  background:white;
  color:black;
}

button{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  min-height:80px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" alt="Logo" class="logo">

  <h1>Ramalan Hari Ini</h1>

  <select id="zodiak">
    <option value="">Pilih Zodiak</option>
    <option>Aries</option>
    <option>Taurus</option>
    <option>Gemini</option>
    <option>Cancer</option>
    <option>Leo</option>
    <option>Virgo</option>
    <option>Libra</option>
    <option>Scorpio</option>
    <option>Sagittarius</option>
    <option>Capricorn</option>
    <option>Aquarius</option>
    <option>Pisces</option>
  </select>

  <button onclick="ramal()">Lihat Ramalan</button>

  <div class="result" id="hasil">Ramalan akan muncul di sini...</div>
</div>

<script>
const dataRamalan = {
  Aries: "Hari ini penuh energi! Cocok untuk memulai hal baru.",
  Taurus: "Keuangan stabil, tapi jangan boros ya.",
  Gemini: "Komunikasi jadi kunci sukses hari ini.",
  Cancer: "Perasaan lebih sensitif, jaga emosi.",
  Leo: "Waktunya bersinar! Banyak peluang datang.",
  Virgo: "Fokus pada detail, hasilnya memuaskan.",
  Libra: "Cari keseimbangan dalam keputusan.",
  Scorpio: "Intuisi kamu kuat hari ini.",
  Sagittarius: "Petualangan baru menanti.",
  Capricorn: "Kerja kerasmu mulai terlihat hasilnya.",
  Aquarius: "Ide kreatif bermunculan.",
  Pisces: "Ikuti kata hati, jangan ragu."
};

function ramal(){
  const z = document.getElementById("zodiak").value;
  const hasil = document.getElementById("hasil");

  if(!z){
    hasil.innerHTML = "Silakan pilih zodiak dulu!";
    return;
  }

  hasil.innerHTML = "<b>" + z + "</b><br>" + dataRamalan[z];
}
</script>

</body>
</html>
